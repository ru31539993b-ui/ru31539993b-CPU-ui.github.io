<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>翻牌認字遊戲 🎮</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Comic Sans MS','Microsoft JhengHei',cursive,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:1200px;margin:0 auto}header{text-align:center;margin-bottom:30px;color:white}h1{font-size:2.5rem;margin-bottom:10px}.subtitle{font-size:1.2rem;opacity:0.9}.controls{display:flex;justify-content:center;gap:15px;margin-bottom:30px}.btn{padding:15px 30px;border:none;border-radius:50px;cursor:pointer;font-weight:bold;box-shadow:0 6px 20px rgba(0,0,0,0.3)}.btn-reset{background:linear-gradient(135deg,#f093fb,#f5576c);color:white}.btn-custom{background:linear-gradient(135deg,#4facfe,#00f2fe);color:white}.btn:hover{transform:translateY(-3px)}.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;padding:20px;max-width:800px;margin:0 auto}.card{background:white;border-radius:15px;height:130px;perspective:1000px;cursor:pointer;box-shadow:0 6px 15px rgba(0,0,0,0.2);position:relative}.card-inner{position:relative;width:100%;height:100%;transition:transform 0.6s;transform-style:preserve-3d}.card.flipped .card-inner{transform:rotateY(180deg)}.card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:15px}.card-front{background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-size:2rem;overflow:hidden}.card-front img{width:100%;height:100%;object-fit:cover}.card-back{background:white;transform:rotateY(180deg);font-size:1.8rem;font-weight:bold;color:#333}.card-back img{max-width:90%;max-height:90%;object-fit:contain}.admin-btn{position:fixed;top:20px;left:20px;background:white;border:none;width:60px;height:60px;border-radius:50%;font-size:1.8rem;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.3);z-index:1000}.admin-indicator{display:none;position:fixed;top:90px;left:20px;background:#ff6b6b;color:white;padding:10px 20px;border-radius:20px;font-weight:bold;z-index:999}.admin-indicator.show{display:block}.upload-btn{position:absolute;bottom:10px;right:10px;background:#4facfe;color:white;border:none;padding:8px 15px;border-radius:20px;font-size:0.9rem;cursor:pointer;z-index:10}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:2000;justify-content:center;align-items:center}.modal.active{display:flex}.modal-content{background:white;border-radius:20px;padding:30px;max-width:500px;width:90%}.modal-header{text-align:center;margin-bottom:20px}.modal-header h2{color:#667eea}.form-group{margin-bottom:15px}.form-group label{display:block;margin-bottom:5px;font-weight:bold}.form-group select,.form-group input,.form-group textarea{width:100%;padding:10px;border:2px solid #ddd;border-radius:10px}.color-picker{display:flex;gap:10px;flex-wrap:wrap;margin-top:5px}.color-option{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent}.color-option.selected{border-color:#333}.card-preview{background:#f5f5f5;border-radius:10px;padding:20px;text-align:center;min-height:100px;display:flex;align-items:center;justify-content:center}.card-preview img{max-width:100%;max-height:100px}.modal-footer{display:flex;gap:10px;margin-top:20px}.btn-save{background:linear-gradient(135deg,#4ecdc4,#44a08d);color:white;flex:1}.btn-close{background:linear-gradient(135deg,#ff6b6b,#ee5a6f);color:white;flex:1}.preview-row{display:flex;gap:10px}.preview-col{flex:1;text-align:center}.preview-col h4{margin-bottom:5px;font-size:0.9rem;color:#666}
</style>
</head>
<body>
<button class="admin-btn" id="adminBtn" title="管理員設定">⚙️</button>
<div class="admin-indicator" id="adminIndicator">🔧 管理員模式</div>
<div class="container">
<header><h1>🎯 翻牌認字遊戲 🎯</h1><p class="subtitle">點擊卡片，學習新字詞！</p></header>
<div class="controls">
<button class="btn btn-reset" id="btnReset">🔄 重置遊戲</button>
<button class="btn btn-custom" id="btnCustom">✏️ 自定義卡片</button>
<button class="btn" id="btnExit" style="background:linear-gradient(135deg,#f093fb,#f5576c);color:white;display:none">❌ 退出管理員</button>
</div>
<div class="cards-grid" id="cardsGrid"></div>
</div>
<div class="modal" id="customModal">
<div class="modal-content">
<div class="modal-header"><h2>✏️ 自定義卡片</h2></div>
<div class="form-group"><label>選擇卡片：</label><select id="cardNumber"></select></div>
<div class="form-group"><label>正面圖片：</label><input type="file" id="frontUpload" accept="image/*" onchange="handleFrontUpload(event)"><div id="frontPreview" style="margin-top:10px;text-align:center"></div></div>
<div class="form-group"><label>背面類型：</label><select id="contentType" onchange="toggleContentType()"><option value="text">文字</option><option value="image">圖片</option></select></div>
<div class="form-group" id="textGroup"><label>文字內容：</label><textarea id="textContent" rows="3"></textarea><label style="margin-top:10px">顏色：</label><div class="color-picker" id="colorPicker"></div></div>
<div class="form-group" id="imageGroup" style="display:none"><label>選擇圖片：</label><input type="file" id="imageUpload" accept="image/*"></div>
<div class="form-group"><label>預覽：</label><div class="preview-row"><div class="preview-col"><h4>正面</h4><div id="previewFront" style="background:#667eea;border-radius:10px;height:80px;display:flex;align-items:center;justify-content:center;color:white;font-size:2rem">🎴</div></div><div class="preview-col"><h4>背面</h4><div id="previewBack" style="background:#f5f5f5;border-radius:10px;height:80px;display:flex;align-items:center;justify-content:center;font-size:2rem">?</div></div></div></div>
<div class="modal-footer"><button class="btn btn-save" id="btnSave">💾 儲存</button><button class="btn btn-close" id="btnClose">❌ 關閉</button></div>
</div>
</div>
<script>
(function(){
const defaultConfig={cards:[{type:'text',content:'貓',color:'#FF6B6B',front:null},{type:'text',content:'狗',color:'#4ECDC4',front:null},{type:'text',content:'鳥',color:'#45B7D1',front:null},{type:'text',content:'魚',color:'#96CEB4',front:null},{type:'text',content:'花',color:'#FFEAA7',front:null},{type:'text',content:'樹',color:'#DDA0DD',front:null},{type:'text',content:'日',color:'#FFB6C1',front:null},{type:'text',content:'月',color:'#87CEEB',front:null},{type:'text',content:'星',color:'#F0E68C',front:null},{type:'text',content:'雲',color:'#B0E0E6',front:null},{type:'text',content:'山',color:'#98D8C8',front:null},{type:'text',content:'水',color:'#F7DC6F',front:null},{type:'text',content:'火',color:'#E74C3C',front:null},{type:'text',content:'土',color:'#8B4513',front:null},{type:'text',content:'風',color:'#A9DFBF',front:null},{type:'text',content:'雨',color:'#5DADE2',front:null},{type:'text',content:'葉',color:'#27AE60',front:null},{type:'text',content:'石',color:'#95A5A6',front:null},{type:'text',content:'沙',color:'#F4D03F',front:null},{type:'text',content:'蟲',color:'#BB8FCE',front:null},{type:'text',content:'果',color:'#F1948A',front:null}],flipDelay:2000};
let config=JSON.parse(localStorage.getItem('cardGameConfig'))||defaultConfig;
let flipTimeouts=[];
let adminMode=false;
const ADMIN_PASSWORD='admin123';
const colors=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#FFB6C1','#87CEEB','#F0E68C','#B0E0E6'];
let currentCardIndex=0;

function renderCards(){
  var g=document.getElementById('cardsGrid');
  if(!g)return;
  g.innerHTML='';
  config.cards.forEach(function(card,i){
    var el=document.createElement('div');
    el.className='card';
    if(adminMode)el.classList.add('admin-mode');
    var backContent=card.type==='image'?'<img src="'+card.content+'" style="max-width:90%;max-height:90%;object-fit:contain">':'<span style="color:'+(card.color||'#4ecdc4')+';font-size:2.5rem;font-weight:bold">'+card.content+'</span>';
    var frontHtml=card.front?'<img src="'+card.front+'">':'🎴';
    var html='<div class="card-inner"><div class="card-front">'+frontHtml+'</div><div class="card-back">'+backContent+'</div></div>';
    if(adminMode)html+='<button class="upload-btn" data-index="'+i+'">'+(card.type==='image'?'🔄更換':'📷上傳')+'</button>';
    el.innerHTML=html;
    el.onclick=function(){flipCard(el,i)};
    g.appendChild(el);
  });
  if(adminMode){
    document.querySelectorAll('.upload-btn').forEach(function(btn){
      btn.onclick=function(e){e.stopPropagation();uploadCardImage(parseInt(btn.getAttribute('data-index')))};
    });
  }
}

function flipCard(el,i){
  if(el.classList.contains('flipped')||adminMode)return;
  el.classList.add('flipped');
  if(flipTimeouts[i])clearTimeout(flipTimeouts[i]);
  flipTimeouts[i]=setTimeout(function(){el.classList.remove('flipped');if(i===config.cards.length-1)createConfetti()},config.flipDelay);
}

function resetGame(){
  document.querySelectorAll('.card').forEach(function(c){c.classList.remove('flipped')});
  flipTimeouts.forEach(function(t){clearTimeout(t)});
  flipTimeouts=[];
}

function createConfetti(){
  var colors=['#ff6b6b','#4ecdc4','#45b7d1','#ffeaa7','#dda0dd'];
  for(var i=0;i<30;i++){
    var c=document.createElement('div');
    c.style.cssText='position:fixed;width:10px;height:10px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+Math.random()*100+'vw;top:-10px;z-index:9999;animation:cf '+(2+Math.random()*2)+'s linear forwards';
    document.body.appendChild(c);
    setTimeout(function(){c.remove()},4000);
  }
  var s=document.createElement('style');
  s.textContent='@keyframes cf{to{transform:translateY(100vh) rotate(720deg);opacity:0}}';
  document.head.appendChild(s);
}

function uploadCardImage(i){
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/*';
  inp.onchange=function(e){
    var f=e.target.files[0];
    if(!f||!f.type.startsWith('image/')){alert('請選擇有效的圖片文件');return}
    // 壓縮圖片
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var ctx=canvas.getContext('2d');
      var maxSize=300;
      var w=img.width,h=img.height;
      if(w>h){if(w>maxSize){h*=maxSize/w;w=maxSize}}else{if(h>maxSize){w*=maxSize/h;h=maxSize}}
      canvas.width=w;canvas.height=h;
      ctx.drawImage(img,0,0,w,h);
      var dataUrl=canvas.toDataURL('image/jpeg',0.7);
      config.cards[i]={type:'image',content:dataUrl,color:config.cards[i].color||'#4ecdc4',front:config.cards[i].front||null};
      try{
        localStorage.setItem('cardGameConfig',JSON.stringify(config));
        renderCards();
        alert('✅ 圖片已儲存！(已壓縮)');
      }catch(e){
        alert('⚠️ 儲存空間不足！請清除啲舊圖片');
      }
    };
    img.src=URL.createObjectURL(f);
  };
  inp.click();
}

function toggleAdminMode(){
  var pw=prompt('請輸入管理員密碼：');
  if(pw===ADMIN_PASSWORD){
    adminMode=!adminMode;
    var ind=document.getElementById('adminIndicator');
    var btn=document.getElementById('btnExit');
    if(adminMode){ind.classList.add('show');btn.style.display='inline-block';alert('✅ 進入管理員模式\n💡 點擊卡片上的按鈕直接上傳背面圖片')}
    else{ind.classList.remove('show');btn.style.display='none';alert('✅ 退出管理員模式')}
    renderCards();
  }else if(pw!==null){alert('❌ 密碼錯誤！');}
}

function exitAdminMode(){
  adminMode=false;
  document.getElementById('adminIndicator').classList.remove('show');
  document.getElementById('btnExit').style.display='none';
  renderCards();
}

function openCustomMode(){
  var modal=document.getElementById('customModal');
  modal.classList.add('active');
  var sel=document.getElementById('cardNumber');
  sel.innerHTML='';
  config.cards.forEach(function(_,i){var o=document.createElement('option');o.value=i;o.textContent='卡片 '+(i+1);sel.appendChild(o)});
  initColorPicker();
  loadCardData();
}

function closeModal(){document.getElementById('customModal').classList.remove('active');}

function initColorPicker(){
  var p=document.getElementById('colorPicker');
  if(!p)return;
  p.innerHTML='';
  colors.forEach(function(c){
    var o=document.createElement('div');
    o.className='color-option';
    o.style.backgroundColor=c;
    o.onclick=function(){document.querySelectorAll('.color-option').forEach(function(x){x.classList.remove('selected')});o.classList.add('selected');updatePreview()};
    p.appendChild(o);
  });
}

function loadCardData(){
  var i=parseInt(document.getElementById('cardNumber').value);
  currentCardIndex=i;
  var card=config.cards[i];
  document.getElementById('frontUpload').value='';
  var frontDiv=document.getElementById('frontPreview');
  if(card.front){
    frontDiv.innerHTML='<img src="'+card.front+'" style="max-width:100px;max-height:100px">';
    document.getElementById('previewFront').innerHTML='<img src="'+card.front+'" style="max-width:100%;max-height:100%;object-fit:cover">';
  }else{
    frontDiv.innerHTML='<span style="color:#999">尚未上傳</span>';
    document.getElementById('previewFront').textContent='🎴';
  }
  document.getElementById('contentType').value=card.type||'text';
  toggleContentType();
  if(card.type==='text'){
    document.getElementById('textContent').value=card.content||'';
    var color=card.color||'#4ecdc4';
    document.querySelectorAll('.color-option').forEach(function(opt,idx){if(colors[idx]===color)opt.classList.add('selected');else opt.classList.remove('selected')});
    updatePreview();
  }else{
    document.getElementById('imageUpload').value='';
    document.getElementById('previewBack').innerHTML='<img src="'+card.content+'" style="max-width:100%;max-height:100%;object-fit:contain">';
  }
}

function handleFrontUpload(e){
  var f=e.target.files[0];
  if(!f||!f.type.startsWith('image/')){alert('請選擇有效的圖片文件');return}
  var r=new FileReader();
  r.onload=function(ev){
    var imgData=ev.target.result;
    document.getElementById('frontPreview').innerHTML='<img src="'+imgData+'" style="max-width:100px;max-height:100px">';
    document.getElementById('previewFront').innerHTML='<img src="'+imgData+'" style="max-width:100%;max-height:100%;object-fit:cover">';
  };
  r.readAsDataURL(f);
}

function toggleContentType(){
  var type=document.getElementById('contentType').value;
  document.getElementById('textGroup').style.display=type==='text'?'block':'none';
  document.getElementById('imageGroup').style.display=type==='image'?'block':'none';
  updatePreview();
}

function updatePreview(){
  var type=document.getElementById('contentType').value;
  var backDiv=document.getElementById('previewBack');
  if(type==='text'){
    var txt=document.getElementById('textContent').value||'?';
    var sel=document.querySelector('.color-option.selected');
    var color=sel?sel.style.backgroundColor:'#4ecdc4';
    backDiv.innerHTML='<span style="color:'+color+';font-size:2rem;font-weight:bold">'+txt+'</span>';
  }else{
    var fileInput=document.getElementById('imageUpload');
    if(fileInput.files&&fileInput.files[0]){
      var reader=new FileReader();
      reader.onload=function(e){backDiv.innerHTML='<img src="'+e.target.result+'" style="max-width:100%;max-height:100%;object-fit:contain">';};
      reader.readAsDataURL(fileInput.files[0]);
    }else{
      var existingImg=document.querySelector('#previewBack img');
      if(existingImg)backDiv.innerHTML='<img src="'+existingImg.src+'" style="max-width:100%;max-height:100%;object-fit:contain">';
      else backDiv.textContent='?';
    }
  }
}

function handleImageUpload(e){
  var f=e.target.files[0];
  if(!f||!f.type.startsWith('image/')){alert('請選擇有效的圖片文件');return}
  var r=new FileReader();
  r.onload=function(ev){document.getElementById('previewBack').innerHTML='<img src="'+ev.target.result+'" style="max-width:100%;max-height:100%;object-fit:contain">';};
  r.readAsDataURL(f);
}

function saveCard(){
  var i=parseInt(document.getElementById('cardNumber').value);
  var frontFile=document.getElementById('frontUpload').files[0];
  var type=document.getElementById('contentType').value;
  var card={type,color:'#4ecdc4',front:null};
  
  if(frontFile&&frontFile.type.startsWith('image/')){
    var r=new FileReader();
    r.onload=function(ev){
      card.front=ev.target.result;
      if(type==='text'){
        card.content=document.getElementById('textContent').value||'新字詞';
        var sel=document.querySelector('.color-option.selected');
        if(sel)card.color=sel.style.backgroundColor;
      }else{
        var prevImg=document.querySelector('#previewBack img');
        if(prevImg&&prevImg.src)card.content=prevImg.src;
        else{alert('請先選擇背面圖片！');return}
      }
      config.cards[i]=card;
      try{
        localStorage.setItem('cardGameConfig',JSON.stringify(config));
        renderCards();
        closeModal();
        alert('✅ 已儲存！');
      }catch(e){
        alert('⚠️ 儲存空間不足！');
      }
      createConfetti();
    };
    r.readAsDataURL(frontFile);
  }else{
    if(type==='text'){
      card.content=document.getElementById('textContent').value||'新字詞';
      var sel=document.querySelector('.color-option.selected');
      if(sel)card.color=sel.style.backgroundColor;
    }else{
      var prevImg=document.querySelector('#previewBack img');
      if(prevImg&&prevImg.src)card.content=prevImg.src;
      else{alert('請先選擇背面圖片！');return}
    }
    config.cards[i]=card;
    try{
      localStorage.setItem('cardGameConfig',JSON.stringify(config));
      renderCards();
      closeModal();
      alert('✅ 已儲存！');
    }catch(e){
      alert('⚠️ 儲存空間不足！');
    }
    createConfetti();
  }
}

document.getElementById('adminBtn').onclick=toggleAdminMode;
document.getElementById('btnReset').onclick=resetGame;
document.getElementById('btnCustom').onclick=openCustomMode;
document.getElementById('btnExit').onclick=exitAdminMode;
document.getElementById('btnSave').onclick=saveCard;
document.getElementById('btnClose').onclick=closeModal;
document.getElementById('cardNumber').onchange=loadCardData;
document.getElementById('contentType').onchange=toggleContentType;
document.getElementById('textContent').oninput=updatePreview;
document.getElementById('imageUpload').onchange=handleImageUpload;

renderCards();
})();
</script>
</body>
</html>
