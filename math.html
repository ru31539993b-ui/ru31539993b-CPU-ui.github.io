<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 算術練習</title>
<link rel="stylesheet" href="style.css">
<style>
  .question {
    font-size: 3rem;
    font-weight: 800;
    color: #6b3a2a;
    margin: 20px 0;
    letter-spacing: 4px;
  }
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .opt-btn {
    background: #fff;
    border: 3px solid #f0d5b0;
    border-radius: 20px;
    padding: 16px;
    font-size: 1.8rem;
    font-weight: 700;
    color: #6b3a2a;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opt-btn:hover { border-color: #ff9a76; background: #fff5ee; }
  .opt-btn:active { transform: scale(0.95); }
  .opt-btn.correct { border-color: #4caf50; background: #e8f5e9; }
  .opt-btn.wrong { border-color: #f44336; background: #ffebee; }
  .score-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    font-size: 1rem;
    color: #7b4a3a;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .streak {
    background: #ff9a76;
    color: #fff;
    border-radius: 40px;
    padding: 4px 16px;
    font-size: 0.95rem;
    font-weight: 700;
  }
  .select-diff {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .diff-btn {
    background: #eee;
    border: none;
    border-radius: 30px;
    padding: 6px 18px;
    font-size: 0.9rem;
    font-weight: 600;
    color: #7b4a3a;
    cursor: pointer;
  }
  .diff-btn.active { background: #ff9a76; color: #fff; }
</style>
</head>
<body>
<div class="container">
  <nav><a href="index.html">← 回到遊戲選單</a></nav>
  <h1>🔢 算術練習</h1>
  <p class="subtitle">選出正確答案，看看你可以連對幾題！</p>

  <div class="select-diff">
    <button class="diff-btn active" data-diff="easy">簡單</button>
    <button class="diff-btn" data-diff="medium">中等</button>
    <button class="diff-btn" data-diff="hard">挑戰</button>
  </div>

  <div class="question" id="question">3 + 5</div>
  <div class="options" id="options"></div>

  <div class="score-row">
    <span>✅ <span id="correct">0</span></span>
    <span>❌ <span id="wrong">0</span></span>
    <span class="streak" id="streak">🔥 連對 0</span>
  </div>
  <button class="btn" id="nextBtn">下一題</button>
  <div class="msg" id="msg"></div>
</div>
<script>
  let difficulty = 'easy';
  let totalCorrect = 0, totalWrong = 0, streak = 0;
  let currentAnswer = 0;
  let answered = false;

  function genQuestion(diff) {
    let a, b, op;
    const max = diff === 'easy' ? 10 : diff === 'medium' ? 30 : 50;
    a = Math.floor(Math.random() * max) + 1;
    if (diff === 'hard' && Math.random() < 0.4) {
      b = Math.floor(Math.random() * a) + 1;
      op = '-';
    } else {
      b = Math.floor(Math.random() * max) + 1;
      op = Math.random() < 0.5 ? '+' : '-';
    }
    if (op === '-' && a < b) [a, b] = [b, a];
    currentAnswer = op === '+' ? a + b : a - b;
    return `${a} ${op} ${b}`;
  }

  function genOptions(correct) {
    const opts = new Set([correct]);
    while (opts.size < 4) {
      let offset = Math.floor(Math.random() * 7) - 3;
      if (offset === 0) offset = 1;
      let v = correct + offset;
      if (v >= 0) opts.add(v);
    }
    return [...opts].sort(() => Math.random() - 0.5);
  }

  function newQuestion() {
    answered = false;
    document.getElementById('msg').textContent = '';
    const q = genQuestion(difficulty);
    document.getElementById('question').textContent = q;
    const opts = genOptions(currentAnswer);
    const container = document.getElementById('options');
    container.innerHTML = '';
    opts.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = v;
      btn.addEventListener('click', () => handleAnswer(btn, v));
      container.appendChild(btn);
    });
  }

  function handleAnswer(btn, val) {
    if (answered) return;
    answered = true;
    if (val === currentAnswer) {
      btn.classList.add('correct');
      totalCorrect++;
      streak++;
      document.getElementById('correct').textContent = totalCorrect;
      document.getElementById('streak').textContent = '🔥 連對 ' + streak;
    } else {
      btn.classList.add('wrong');
      totalWrong++;
      streak = 0;
      document.getElementById('wrong').textContent = totalWrong;
      document.getElementById('streak').textContent = '🔥 連對 0';
      document.querySelectorAll('.opt-btn').forEach(b => {
        if (parseInt(b.textContent) === currentAnswer) b.classList.add('correct');
      });
    }
  }

  document.getElementById('nextBtn').addEventListener('click', newQuestion);
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
      totalCorrect = 0; totalWrong = 0; streak = 0;
      document.getElementById('correct').textContent = '0';
      document.getElementById('wrong').textContent = '0';
      document.getElementById('streak').textContent = '🔥 連對 0';
      newQuestion();
    });
  });

  newQuestion();
</script>
</body>
</html>
