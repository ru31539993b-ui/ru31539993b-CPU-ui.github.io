<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 兒童遊戲樂園</title>
<link rel="stylesheet" href="style.css">
<style>
  .container { max-width: 480px; }
  h1 { font-size: 2.2rem; }
  .hero-emoji { font-size: 3.6rem; display: block; margin-bottom: 6px; }
  .game-grid { margin-top: 24px; }
  footer { margin-top: 28px; font-size: 0.85rem; color: #b09a8a; }
</style>
</head>
<body>
<div class="container">
  <span class="hero-emoji">🎮</span>
  <h1>兒童遊戲樂園</h1>
  <p class="subtitle">選一個遊戲開始玩吧！</p>

  <div class="game-grid">
    <a href="memory.html" class="game-card">
      <div class="game-icon">🐶</div>
      <div class="game-info">
        <h2>記憶翻牌</h2>
        <p>翻開牌卡，找到相同的動物配對</p>
      </div>
    </a>
    <a href="math.html" class="game-card">
      <div class="game-icon">🔢</div>
      <div class="game-info">
        <h2>算術練習</h2>
        <p>簡單加減法，越答越進步</p>
      </div>
    </a>
    <a href="puzzle.html" class="game-card">
      <div class="game-icon">🧩</div>
      <div class="game-info">
        <h2>滑塊拼圖</h2>
        <p>滑動方塊，把動物拼回正確位置</p>
      </div>
    </a>
  </div>

  <div class="game-grid" style="margin-top:8px;">
    <a href="journal.html" class="game-card" style="background:#fff5ee;">
      <div class="game-icon">📖</div>
      <div class="game-info">
        <h2>電腦課心得</h2>
        <p>我的學習歷程記錄</p>
      </div>
    </a>
  </div>
  <footer>🧸 專為小朋友設計的可愛遊戲區</footer>
</div>
</body>
</html>
